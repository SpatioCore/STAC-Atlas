server {
    listen 80;
    server_name atlas.stacindex.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name atlas.stacindex.org;

    ssl_certificate /etc/letsencrypt/live/atlas.stacindex.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atlas.stacindex.org/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $target_service stac-atlas-ui-1;    
        proxy_pass http://$target_service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 3000 ssl;
    server_name atlas.stacindex.org;

    ssl_certificate /etc/letsencrypt/live/atlas.stacindex.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atlas.stacindex.org/privkey.pem;

    resolver 127.0.0.11 valid=30s;
    set $target_service api;

    location / {
        proxy_pass http://$target_service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}