# This docker-compose file orchestrates the startup of the entire STAC-Atlas project.
# It includes the docker-compose configurations from the individual components.

networks:
  stac-network:
    name: stac-network
    external: true

volumes:
  stac_data:

services:
  db:
    extends:
      file: db/docker-compose.yml
      service: database
    networks: [stac-network]

  crawler:
    extends:
      file: crawler/docker-compose.yml
      service: crawler
    networks: [stac-network]
    depends_on:
      db:
        condition: service_healthy
  api:
    extends:
      file: api/docker-compose.yml
      service: api
    networks: [stac-network]
    depends_on:
      crawler:
        condition: service_started

  ui:
    extends:
      file: ui/docker-compose.yml
      service: ui
    networks: [stac-network]
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [stac-network]
    depends_on:
      - ui